<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabela de Projetos GEREB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <div>
          <span class="eyebrow">Base editável</span>
          <h1>Tabela de Projetos GEREB</h1>
          <p>Consulta, edição e manutenção rápida dos projetos que alimentam o painel.</p>
        </div>
        <div class="header-actions">
          <button class="button button-secondary" id="restoreButton" type="button">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
            Restaurar base
          </button>
          <button class="button button-secondary" id="exportButton" type="button">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
            Exportar CSV
          </button>
          <button class="button button-primary" id="newProjectButton" type="button">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            Adicionar projeto
          </button>
        </div>
      </header>

      <section class="summary-grid" aria-label="Resumo da base">
        <article>
          <span>Projetos</span>
          <strong id="totalProjects">0</strong>
        </article>
        <article>
          <span>Valor total</span>
          <strong id="totalValue">R$ 0,00</strong>
        </article>
        <article>
          <span>Realizado</span>
          <strong id="realizedValue">R$ 0,00</strong>
        </article>
        <article>
          <span>Saldo atual</span>
          <strong id="balanceValue">R$ 0,00</strong>
        </article>
      </section>

      <section class="toolbar" aria-label="Ferramentas da tabela">
        <label class="search-field">
          <span class="sr-only">Buscar</span>
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m21 21-4.35-4.35"/><circle cx="11" cy="11" r="7"/></svg>
          <input id="searchInput" type="search" placeholder="Projeto, coordenador, instrumento, unidade..." />
        </label>
        <label>
          <span class="sr-only">Coordenação</span>
          <select id="unitFilter" aria-label="Filtrar por coordenação">
            <option value="Todos">Todos</option>
          </select>
        </label>
        <label>
          <span class="sr-only">Financiador</span>
          <select id="funderFilter" aria-label="Filtrar por financiador">
            <option value="Todos">Todos</option>
          </select>
        </label>
      </section>

      <section class="table-panel" aria-label="Tabela editável de projetos">
        <div class="table-scroll">
          <table>
            <thead>
              <tr id="projectHeaderRow"></tr>
            </thead>
            <tbody id="projectRows"></tbody>
          </table>
        </div>
        <div class="table-footer">
          <span id="filteredCount">0 projetos encontrados</span>
          <button class="link-button" id="toggleRowsButton" type="button" hidden>Mostrar mais</button>
          <span>Última atualização: hoje</span>
        </div>
      </section>
    </main>

    <dialog id="projectDialog">
      <form method="dialog" class="dialog-card" id="projectForm">
        <header>
          <div>
            <span class="eyebrow">Registro</span>
            <h2 id="dialogTitle">Adicionar projeto</h2>
          </div>
          <button class="icon-button" id="closeDialog" type="button" aria-label="Fechar">×</button>
        </header>
        <section class="quick-fill" aria-label="Preenchimento rápido">
          <span>Preenchimento rápido</span>
          <div>
            <button class="button button-secondary" id="copyLastProjectButton" type="button">Usar último projeto</button>
            <button class="button button-secondary" id="todayDatesButton" type="button">Datas de hoje</button>
            <button class="button button-secondary" id="calculateValuesButton" type="button">Calcular valores</button>
            <button class="button button-secondary" id="clearValuesButton" type="button">Zerar valores</button>
          </div>
        </section>
        <div class="form-grid">
          <label>
            <span>Projeto ID</span>
            <input name="id" required />
          </label>
          <label>
            <span>Título</span>
            <input name="title" required />
          </label>
          <label class="span-2">
            <span>Objetivo geral</span>
            <textarea name="objective" rows="3"></textarea>
          </label>
          <label>
            <span>Coordenação</span>
            <input name="unit" required />
          </label>
          <label>
            <span>Coordenador</span>
            <input name="coordinator" required />
          </label>
          <label>
            <span>Nº processo</span>
            <input name="process" />
          </label>
          <label>
            <span>Tipo instrumento</span>
            <input name="contractType" />
          </label>
          <label>
            <span>Parceiro</span>
            <input name="funder" required />
          </label>
          <label>
            <span>Categoria TEDs</span>
            <input name="tedCategory" />
          </label>
          <label>
            <span>Nº instrumento</span>
            <input name="instrument" required />
          </label>
          <label>
            <span>Natureza</span>
            <input name="nature" />
          </label>
          <label>
            <span>Início</span>
            <input name="start" type="date" required />
          </label>
          <label>
            <span>Fim</span>
            <input name="end" type="date" required />
          </label>
          <label class="span-2">
            <span>Eixo mapa estratégico</span>
            <textarea name="axis" rows="2"></textarea>
          </label>
          <label>
            <span>Valor total</span>
            <input name="total" type="number" min="0" step="0.01" required />
          </label>
          <label>
            <span>Recurso liberado</span>
            <input name="released" type="number" min="0" step="0.01" />
          </label>
          <label>
            <span>Recurso a receber</span>
            <input name="receivable" type="number" min="0" step="0.01" />
          </label>
          <label>
            <span>Total realizado</span>
            <input name="realized" type="number" min="0" step="0.01" required />
          </label>
          <label>
            <span>Total comprometido</span>
            <input name="committed" type="number" min="0" step="0.01" />
          </label>
          <label>
            <span>Saldo atual</span>
            <input name="balance" type="number" step="0.01" required />
          </label>
        </div>
        <footer>
          <button class="button button-secondary" id="cancelDialog" type="button">Cancelar</button>
          <button class="button button-primary" type="submit">Salvar</button>
        </footer>
      </form>
    </dialog>

    <script src="./projects-data.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
